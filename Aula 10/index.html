<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
</head>
<body>

<h2>Formulario</h2>

<table border="1" width="700">
    
    <tr>
        <td>Nome:</td>
        <td><input type="text" placeholder="Digite seu nome"></td>
    </tr>

    <tr>
        <td>E-mail pessoal:</td>
        <td><input type="email"></td>
    </tr>

    <tr>
        <td>E-mail (patter):</td>
        <td><input type="text" placeholder="Digite seu email com @"></td>
    </tr>

    <tr>
        <td>Senha:</td>
        <td><input type="password"></td>
    </tr>

    <tr>
        <td>Idade:</td>
        <td><input type="number" size="5"></td>
    </tr>

    <tr>
        <td>Deixe um comentário:</td>
        <td><textarea rows="4" cols="40"></textarea></td>
    </tr>

    <tr>
        <td>
            Matéria de interesse:<br>
            <input type="checkbox"> Backend<br>
            <input type="checkbox"> FrontEnd<br>
            <input type="checkbox"> FullStack
        </td>

        <td>
            Tipo de Viagem:<br>
            <input type="radio" name="viagem"> Negócios<br>
            <input type="radio" name="viagem"> Lazer<br>
            <input type="radio" name="viagem"> Turismo<br>
            <input type="radio" name="viagem"> Acadêmico
        </td>
    </tr>

    <tr>
        <td>
            Esporte favorito:<br>
            <select size="4">
                <option>Futebol</option>
                <option>Basquete</option>
                <option>Vôlei</option>
                <option>Tênis</option>
            </select>
        </td>

        <td>
            Investimentos:
            <select>
                <option>Poupança</option>
                <option>CDB</option>
                <option>Tesouro Direto</option>
                <option>Fundos Imobiliários</option>
                <option>CDI</option>
                <option>Debêntures</option>
                <option>Criptomoedas</option>
                <option>Ações</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>
            Escolha uma cor:
            <input type="color">
        </td>

        <td>
            Selecione um arquivo:
            <input type="file">
        </td>
    </tr>

    <tr>
        <td colspan="2">
            Data e Hora envio:
            <input type="datetime-local">
        </td>
    </tr>

    <tr>
        <td>
            <input type="submit" value="Enviar">
        </td>

        <td>
            <input type="reset" value="Limpar">
        </td>
    </tr>

</table>

</body>
</html>
</body>
</html>
